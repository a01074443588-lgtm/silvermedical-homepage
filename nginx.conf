map $request_method $consultation_rate_key {
    default "";
    POST $binary_remote_addr;
}

limit_req_zone $consultation_rate_key zone=consultation_submit:10m rate=5r/m;

map $http_x_forwarded_proto $upstream_forwarded_proto {
    default $scheme;
    https https;
}

map $host $is_public_staff_host {
    default 0;
    staff.silvermedical.kr 1;
}

map $http_cf_access_jwt_assertion $has_cloudflare_access {
    default 1;
    "" 0;
}

map "$is_public_staff_host:$has_cloudflare_access" $deny_unprotected_staff {
    default 0;
    "1:0" 1;
}

map $upstream_forwarded_proto $staff_cookie_security {
    default nosecure;
    https secure;
}

upstream consultation_backend {
    server consultation:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    client_max_body_size 8m;

    location = /news {
        return 301 /news/;
    }

    location = /stories.html {
        return 301 /news/;
    }

    location ^~ /news/ {
        proxy_pass http://consultation_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location ^~ /news-media/ {
        proxy_pass http://consultation_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=604800" always;
    }

    location = /consult {
        return 301 /consult/;
    }

    location = /benefits-data/ {
        proxy_pass http://consultation_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, max-age=0" always;
    }

    location ^~ /consult/ {
        limit_req zone=consultation_submit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://consultation_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location ^~ /staff/ {
        return 404;
    }

    location ^~ /staff-assets/ {
        return 404;
    }

    location / {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;

    location = /404.html {
        internal;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

server {
    listen 8081;
    listen [::]:8081;
    server_name _;
    charset utf-8;
    client_max_body_size 8m;

    location ^~ /news-media/ {
        if ($deny_unprotected_staff) {
            return 403;
        }

        allow 127.0.0.1;
        allow ::1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://consultation_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $upstream_forwarded_proto;
    }

    location ^~ /staff/ {
        if ($deny_unprotected_staff) {
            return 403;
        }

        allow 127.0.0.1;
        allow ::1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://consultation_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $upstream_forwarded_proto;
        # Internal HTTP strips Secure; Cloudflare HTTPS preserves it.
        proxy_cookie_flags sessionid $staff_cookie_security;
        proxy_cookie_flags csrftoken $staff_cookie_security;
    }

    location ^~ /staff-assets/ {
        if ($deny_unprotected_staff) {
            return 403;
        }

        allow 127.0.0.1;
        allow ::1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://consultation_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $upstream_forwarded_proto;
    }

    location / {
        return 404;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
}
