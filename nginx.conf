map $request_method $consultation_rate_key {
    default "";
    POST $binary_remote_addr;
}

limit_req_zone $consultation_rate_key zone=consultation_submit:10m rate=5r/m;

upstream consultation_backend {
    server consultation:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    client_max_body_size 128k;

    location = /consult {
        return 301 /consult/;
    }

    location ^~ /consult/ {
        limit_req zone=consultation_submit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://consultation_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location ^~ /staff/ {
        return 404;
    }

    location ^~ /staff-assets/ {
        return 404;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;

    location = /404.html {
        internal;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

server {
    listen 8081;
    listen [::]:8081;
    server_name _;
    charset utf-8;
    client_max_body_size 128k;

    location ^~ /staff/ {
        allow 127.0.0.1;
        allow ::1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://consultation_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # The staff portal is HTTP-only on the private LAN. Keep public cookies
        # secure while allowing the internal browser to retain its login session.
        proxy_cookie_flags sessionid nosecure;
        proxy_cookie_flags csrftoken nosecure;
    }

    location ^~ /staff-assets/ {
        allow 127.0.0.1;
        allow ::1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://consultation_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 404;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
}
